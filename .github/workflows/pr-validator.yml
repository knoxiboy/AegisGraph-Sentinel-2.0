name: "PR Hard Gatekeeper"

on:
  pull_request:
    types: [opened, edited]

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Crucial: gives the script power to comment and close
    steps:
      - name: Validate PR Content
        id: checker
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          import os, sys, re
          body = os.getenv('PR_BODY', '')
          
          errors = []
          if not re.search(r'Fixes\s*#\s*\d+', body, re.IGNORECASE):
              errors.append("- Missing valid issue number link (e.g., `Fixes #123`).")
          if not re.search(r'!\[.*?\]\(.*?\)|<img\s+[^>]*src=', body):
              errors.append("- Missing an attached screenshot or terminal log image.")
              
          if errors:
              # Export errors to a file so the next step can read them
              with open("errors.txt", "w") as f:
                  f.write("\n".join(errors))
              sys.exit(1)
          print("All good!")
        shell: python

      - name: Reject and Auto-Close PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const errors = fs.readFileSync('errors.txt', 'utf8');
            const commentBody = `⚠️ **PULL REQUEST REJECTED** ⚠️\n\n@${context.actor}, your PR has been automatically closed because it failed validation requirements:\n${errors}\n\n*Please fix your description/screenshots locally and re-open the PR.*`;
            
            // 1. Post the violation comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
            
            // 2. Instantly close the PR
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });